# Expect `ansible-playbook` run from ~/algo-ansible (inventory and tmp are relative to cwd).
[defaults]
inventory = ./inventory/hosts
local_tmp = ./.ansible/tmp
host_key_checking = false
interpreter_python = auto_silent
timeout = 60
retry_files_enabled = false
stdout_callback = default

[privilege_escalation]
# Algo’s playbooks use become on the remote; localhost tasks expect become false. Set per play.
become = false
